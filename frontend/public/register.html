<!DOCTYPE html>
<html>
  <head>
    <title>Cybernetic Sabotage</title>
    <link rel="stylesheet" href="./styles/login.css">
  </head>
  <body>
    <canvas></canvas>
    <div id="container">
      <div id="title">Cybernetic Sabotage</div>
      <form >
        <div id="input-container">
          <input type="text" placeholder="Enter your nickname" id="username" required>
          <br>
          <input type="password" name="pass" id="pass" required placeholder="Password***">
          <p class="hidden" id="warning">wrong password!!</p>
        </div>
        
        <div id="button-container">
          <div class="routing-button" onclick="startGame('register')">Register</div>
          <a href="index.html" class="white-text"><span>Already have an account?</span><span class="register-text"> Log In Here</span></a>
        </div>
      </form>
    </div>
    <script src="scripts/sweetalert2.all.min.js" type="text/javascript"></script>
    <script src="scripts/config.js" type="text/javascript"></script>
    <script src="scripts/index.js" type="text/javascript"></script>
  </body>
</html>
